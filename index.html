<style>
:root {
  --bg: #f0f4ff;
  --surface: #ffffff;
  --surface2: #e8edf8;
  --border: #d0d8ee;
  --accent: #2563eb;
  --green: #059669;
  --red: #dc2626;
  --yellow: #d97706;
  --text: #0f172a;
  --text2: #475569;
  --text3: #94a3b8;
  --font: 'Noto Sans KR', sans-serif;
  --tab-h: 64px;
  --top-h: 56px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  overflow: hidden;
}

/* ── Top Bar ── */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--top-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 16px;
  z-index: 100;
  gap: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,.07);
}
.topbar-title { font-size: 18px; font-weight: 900; color: var(--text); flex: 1; }
.topbar-sub { font-size: 12px; color: var(--text2); }
.topbar-btn {
  background: var(--accent); color: white;
  border: none; border-radius: 10px;
  padding: 8px 14px; font-size: 13px; font-weight: 700;
  font-family: var(--font); cursor: pointer;
  white-space: nowrap;
}

/* ── Scroll Area ── */
.scroll-area {
  position: fixed;
  top: var(--top-h);
  left: 0; right: 0;
  bottom: calc(var(--tab-h) + var(--safe-bottom));
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px 14px;
}

/* ── Bottom Tab Bar ── */
.tabbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: calc(var(--tab-h) + var(--safe-bottom));
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  padding-bottom: var(--safe-bottom);
  z-index: 100;
  box-shadow: 0 -2px 8px rgba(0,0,0,.07);
}
.tab-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px; cursor: pointer;
  border: none; background: none;
  padding: 8px 0;
  transition: all .15s;
}
.tab-icon { font-size: 22px; line-height: 1; }
.tab-label { font-size: 10px; color: var(--text2); font-family: var(--font); font-weight: 500; }
.tab-item.active .tab-label { color: var(--accent); font-weight: 700; }
.tab-item.active .tab-icon { transform: scale(1.1); }

/* ── Pages ── */
.page { display: none; }
.page.active { display: block; }

/* ── Cards (2-col grid) ── */
.cards-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  position: relative; overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
.card::before { content:''; position:absolute; top:0;left:0;right:0; height:3px; }
.card.blue::before { background: var(--accent); }
.card.green::before { background: var(--green); }
.card.red::before { background: var(--red); }
.card.yellow::before { background: var(--yellow); }
.card-label { font-size: 10px; color: var(--text3); margin-bottom: 6px; letter-spacing:.5px; }
.card-value { font-size: 22px; font-weight: 900; }
.card-value.blue { color: var(--accent); }
.card-value.green { color: var(--green); }
.card-value.red { color: var(--red); }
.card-value.yellow { color: var(--yellow); font-size: 15px; }
.card-sub { font-size: 11px; color: var(--text2); margin-top: 4px; }

/* ── Section title ── */
.section-title {
  font-size: 13px; font-weight: 700; color: var(--text2);
  margin-bottom: 10px; margin-top: 4px;
  display: flex; align-items: center; justify-content: space-between;
}

/* ── List items (tenant payment rows) ── */
.list-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,.05);
}
.list-item-left { flex: 1; min-width: 0; }
.list-item-name { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
.list-item-sub { font-size: 12px; color: var(--text2); }
.list-item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
.list-item-amount { font-size: 14px; font-weight: 700; }

.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 9px; border-radius: 20px;
  font-size: 11px; font-weight: 700;
}
.badge.paid   { background: rgba(5,150,105,.12); color: var(--green); border: 1px solid rgba(5,150,105,.25); }
.badge.unpaid { background: rgba(220,38,38,.10); color: var(--red); border: 1px solid rgba(220,38,38,.25); }
.dot { width:5px; height:5px; border-radius:50%; background:currentColor; }

/* ── Month nav ── */
.month-row {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 10px 16px; margin-bottom: 12px;
}
.month-row span { font-size: 16px; font-weight: 900; }
.month-nav-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); border-radius: 8px; width: 36px; height: 36px;
  font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}

/* ── Filter chips ── */
.chips { display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; }
.chips::-webkit-scrollbar { display: none; }
.chip {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text2); border-radius: 20px; padding: 6px 14px;
  font-size: 12px; font-weight: 700; white-space: nowrap; cursor: pointer;
  font-family: var(--font);
}
.chip.active { background: rgba(37,99,235,.12); border-color: var(--accent); color: var(--accent); }

/* ── Pay row action ── */
.pay-action {
  background: rgba(220,38,38,.10); color: var(--red);
  border: 1px solid rgba(220,38,38,.35);
  border-radius: 8px; padding: 6px 12px;
  font-size: 12px; font-weight: 700; cursor: pointer; font-family: var(--font);
  white-space: nowrap;
}
.pay-done {
  background: none; color: var(--text3); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 10px; font-size: 11px; font-family: var(--font);
}

/* ── Log form ── */
.log-form {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px; margin-bottom: 14px;
}
.form-group { margin-bottom: 12px; }
.form-group:last-child { margin-bottom: 0; }
.form-label { font-size: 11px; color: var(--text2); margin-bottom: 5px; display: block; font-weight: 600; }
.form-input {
  width: 100%; background: #f8faff; border: 1px solid var(--border);
  border-radius: 10px; padding: 11px 13px; color: var(--text);
  font-size: 15px; font-family: var(--font); outline: none;
  -webkit-appearance: none; appearance: none;
}
.form-input:focus { border-color: var(--accent); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.btn-full {
  width: 100%; background: var(--accent); color: white;
  border: none; border-radius: 12px; padding: 14px;
  font-size: 15px; font-weight: 700; font-family: var(--font); cursor: pointer;
  margin-top: 12px;
}
.btn-full.red { background: var(--red); color: white; }

/* ── Tenant cards ── */
.tenant-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px; margin-bottom: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,.05);
}
.tc-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.tc-name { font-size: 17px; font-weight: 900; }
.tc-building { font-size: 11px; color: var(--accent); background: rgba(79,142,247,.1); padding: 3px 9px; border-radius: 20px; }
.tc-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid var(--border);
}
.tc-row:last-of-type { border-bottom: none; }
.tc-key { font-size: 12px; color: var(--text2); }
.tc-val { font-size: 13px; font-weight: 600; text-align: right; }
.tc-actions { display: flex; gap: 8px; margin-top: 12px; }
.tc-btn {
  flex: 1; border-radius: 10px; padding: 10px;
  font-size: 13px; font-weight: 700; cursor: pointer; font-family: var(--font);
  border: none;
}
.tc-btn.edit { background: rgba(37,99,235,.10); color: var(--accent); border: 1px solid rgba(37,99,235,.25); }
.tc-btn.del  { background: rgba(220,38,38,.08); color: var(--red); border: 1px solid rgba(220,38,38,.2); }

/* ── Log list ── */
.log-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 12px;
}
.log-item-main { flex: 1; }
.log-item-name { font-size: 14px; font-weight: 700; }
.log-item-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
.log-item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.log-amount { font-size: 15px; font-weight: 900; color: var(--green); }
.log-del { background: none; border: none; color: var(--text3); font-size: 18px; cursor: pointer; padding: 4px; }

/* ── Yearly ── */
.yearly-row {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px; margin-bottom: 8px;
}
.yr-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.yr-name { font-size: 15px; font-weight: 700; }
.yr-total { font-size: 15px; font-weight: 900; color: var(--yellow); }
.yr-months { display: grid; grid-template-columns: repeat(6,1fr); gap: 4px; }
.yr-month { text-align: center; }
.yr-month-label { font-size: 9px; color: var(--text3); }
.yr-month-val { font-size: 10px; font-weight: 700; margin-top: 2px; }
.yr-month-val.has { color: var(--green); }
.yr-month-val.rf  { color: var(--green); font-size: 9px; }
.yr-month-val.no  { color: var(--text3); }

/* ── Bottom Sheet Modal ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.6); z-index: 200;
  align-items: flex-end;
}
.overlay.show { display: flex; }
.sheet {
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  width: 100%; max-height: 90vh;
  overflow-y: auto;
  padding: 0 16px calc(20px + var(--safe-bottom));
  animation: slideUp .22s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.sheet-handle {
  width: 36px; height: 4px; background: var(--border);
  border-radius: 2px; margin: 12px auto 16px;
}
.sheet-title { font-size: 18px; font-weight: 900; margin-bottom: 18px; }

/* ── Toast ── */
.toast {
  position: fixed; bottom: calc(var(--tab-h) + 12px + var(--safe-bottom)); left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--green); color: #ffffff;
  padding: 11px 22px; border-radius: 24px;
  font-size: 13px; font-weight: 700; white-space: nowrap;
  opacity: 0; transition: all .25s; z-index: 300; pointer-events: none;
  box-shadow: 0 4px 16px rgba(0,0,0,.15);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Empty state ── */
.empty {
  text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px;
}

/* ── Search ── */
.search-wrap { position: relative; margin-bottom: 12px; }
.search-input {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 11px 13px 11px 38px;
  color: var(--text); font-size: 14px; font-family: var(--font); outline: none;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.search-input:focus { border-color: var(--accent); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 16px; }


/* ── History Year Sections ── */
.hist-year-section {
  margin-bottom: 14px;
}
.hist-year-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}
.hist-year-label {
  font-size: 13px;
  font-weight: 900;
  color: var(--text);
}
.hist-year-stat {
  font-size: 11px;
  font-weight: 700;
  padding: 2px 10px;
  border-radius: 20px;
}
.hist-year-stat.all-paid   { background: rgba(5,150,105,.12); color: var(--green); }
.hist-year-stat.all-unpaid { background: rgba(220,38,38,.10); color: var(--red); }
.hist-year-stat.partial    { background: rgba(217,119,6,.12); color: var(--yellow); }

/* ── History Modal ── */
.hist-grid {
  display: grid;
  grid-template-columns: repeat(6,1fr);
  gap: 5px;
  margin: 8px 0;
}
.hist-cell-label { font-size: 11px; font-weight: 800; }
.hist-cell-icon  { font-size: 16px; font-weight: 900; }
.hist-streak-box {
  background: #f8faff;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  margin-bottom: 10px;
  font-size: 13px;
}
.hist-summary-box {
  background: #f8faff;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  margin-bottom: 10px;
  font-size: 13px;
}

/* Number input formatting */
.num-input-wrap { position: relative; }
.num-input-display {
  position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
  font-size: 15px; color: var(--text); pointer-events: none;
}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar" id="topbar">
  <div class="topbar-title" id="topbar-title">🏠 월세관리</div>
  <div class="topbar-sub" id="topbar-sub"></div>
  <button class="topbar-btn" id="topbar-action" style="display:none"></button>
</div>

<!-- Scroll Area -->
<div class="scroll-area" id="scroll-area">

  <!-- ── 대시보드 ── -->
  <div id="page-dashboard" class="page active">
    <div class="cards-2">
      <div class="card blue">
        <div class="card-label">전체 세입자</div>
        <div class="card-value blue">11명</div>
        <div class="card-sub" id="d-building-sub">계산중</div>
      </div>
      <div class="card yellow">
        <div class="card-label">이번달 목표</div>
        <div class="card-value yellow" id="d-target">계산중</div>
        <div class="card-sub">월세+관리비</div>
      </div>
      <div class="card green">
        <div class="card-label">납부완료</div>
        <div class="card-value green" id="d-paid">0명</div>
        <div class="card-sub" id="d-paid-amt">₩0</div>
      </div>
      <div class="card red">
        <div class="card-label">미납</div>
        <div class="card-value red" id="d-unpaid">11명</div>
        <div class="card-sub" id="d-unpaid-sub">확인필요</div>
      </div>
    </div>

    <div class="section-title">최근 입금 기록</div>
    <div id="d-log-list"><div class="empty">입금 기록이 없습니다</div></div>

    <div style="margin-top:20px;display:flex;gap:10px;">
      <button onclick="exportData()" style="flex:1;padding:13px;border-radius:12px;border:none;background:#1d4ed8;color:#fff;-webkit-text-fill-color:#fff;font-size:14px;font-weight:800;cursor:pointer;">📤 내보내기</button>
      <button onclick="document.getElementById('import-file').click()" style="flex:1;padding:13px;border-radius:12px;border:none;background:#059669;color:#fff;-webkit-text-fill-color:#fff;font-size:14px;font-weight:800;cursor:pointer;">📥 불러오기</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    </div>
    <div style="text-align:center;font-size:11px;color:var(--text3);margin-top:6px;">내보내기 → JSON 파일을 다른 기기에서 불러오기 하면 데이터가 동기화됩니다</div>
  </div>

  <!-- ── 납부현황 ── -->
  <div id="page-monthly" class="page">
    <div class="month-row">
      <button class="month-nav-btn" onclick="changeMonth(-1)">‹</button>
      <span id="month-label"></span>
      <button class="month-nav-btn" onclick="changeMonth(1)">›</button>
    </div>
    <div class="chips" id="monthly-chips">
      <div class="chip active" onclick="filterMonthly('all',this)">전체</div>

      <div class="chip" onclick="filterMonthly('미납',this)">미납만</div>
    </div>
    <div id="monthly-list"></div>
  </div>

  <!-- ── 입금기록 ── -->
  <div id="page-log" class="page">
    <div class="log-form">
      <div class="form-group">
        <label class="form-label">세입자 선택</label>
        <select class="form-input" id="log-tenant"></select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">입금일</label>
          <input type="date" class="form-input" id="log-date">
        </div>
        <div class="form-group">
          <label class="form-label">은행</label>
          <select class="form-input" id="log-bank">
            <option>카카오뱅크</option>
            <option>신한은행</option>
            <option>기타</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">입금액 (원)</label>
        <input type="number" class="form-input" id="log-amount" placeholder="예: 850000" inputmode="numeric">
      </div>
      <div class="form-group">
        <label class="form-label">메모</label>
        <input type="text" class="form-input" id="log-memo" placeholder="1월 월세+관리비">
      </div>
      <button class="btn-full" onclick="addLog()">✓ 입금 기록 저장</button>
    </div>

    <div class="section-title">입금 내역</div>
    <div id="log-list"><div class="empty">입금 기록이 없습니다</div></div>
  </div>

  <!-- ── 세입자 ── -->
  <div id="page-tenants" class="page">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" placeholder="이름 검색..." oninput="filterTenants(this.value)">
    </div>
    <div class="chips">
      <div class="chip active" onclick="filterTenantBuilding('all',this)">전체</div>

    </div>
    <div id="tenant-list"></div>
  </div>

  <!-- ── 연간현황 ── -->
  <div id="page-yearly" class="page">
    <div class="month-row">
      <button class="month-nav-btn" onclick="changeYear(-1)">‹</button>
      <span id="year-label" style="font-size:17px;font-weight:900"></span>
      <button class="month-nav-btn" onclick="changeYear(1)">›</button>
    </div>
    <div id="yearly-list"></div>
  </div>

</div>

<!-- Bottom Tab Bar -->
<nav class="tabbar">
  <button class="tab-item active" onclick="showPage('dashboard')">
    <span class="tab-icon">📊</span>
    <span class="tab-label">대시보드</span>
  </button>
  <button class="tab-item" onclick="showPage('monthly')">
    <span class="tab-icon">💰</span>
    <span class="tab-label">납부현황</span>
  </button>
  <button class="tab-item" onclick="showPage('log')">
    <span class="tab-icon">📝</span>
    <span class="tab-label">입금기록</span>
  </button>
  <button class="tab-item" onclick="showPage('tenants')">
    <span class="tab-icon">👥</span>
    <span class="tab-label">세입자</span>
  </button>
  <button class="tab-item" onclick="showPage('yearly')">
    <span class="tab-icon">📅</span>
    <span class="tab-label">연간</span>
  </button>
</nav>

<!-- 납부입력 Sheet -->
<div class="overlay" id="pay-modal">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">💰 납부 입력</div>
    <div class="form-group">
      <label class="form-label">세입자</label>
      <select class="form-input" id="modal-tenant"></select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">입금일</label>
        <input type="date" class="form-input" id="modal-date">
      </div>
      <div class="form-group">
        <label class="form-label">은행</label>
        <select class="form-input" id="modal-bank">
          <option>카카오뱅크</option>
          <option>신한은행</option>
          <option>기타</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">입금액 (원)</label>
      <input type="number" class="form-input" id="modal-amount" inputmode="numeric">
    </div>
    <div class="form-group">
      <label class="form-label">메모</label>
      <input type="text" class="form-input" id="modal-memo">
    </div>
    <button class="btn-full" onclick="confirmPay()">✓ 완납 처리</button>
    <button class="btn-full" style="background:var(--surface2);color:var(--text2);margin-top:8px" onclick="closeSheet('pay-modal')">취소</button>
  </div>
</div>

<!-- 세입자 추가/수정 Sheet -->
<div class="overlay" id="tenant-modal">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="tenant-modal-title">👤 세입자 추가</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">건물</label>
        <select class="form-input" id="t-building" onchange="handleBuildingChange(this)">
          <option value="연신내">연신내</option>
          <option value="봉천동 연세">봉천동 연세</option>

const FB_URL = "https://mymonth-6cd61-default-rtdb.firebaseio.com/mymonth.json";

function loadFromFirebase() {
  showToast('🔄 데이터 동기화 중...');
  fetch(FB_URL)
    .then(r => r.json())
    .then(data => {
      if (data) {
        tenants  = data.tenants  || tenants;
        payments = data.payments || payments;
        logs     = data.logs     || logs;
        nextId   = Math.max(0, ...tenants.map(t=>t.id)) + 1;
      }
      localStorage.setItem('rm_tenants',  JSON.stringify(tenants));
      localStorage.setItem('rm_payments', JSON.stringify(payments));
      localStorage.setItem('rm_logs',     JSON.stringify(logs));
      renderDashboard();
      renderMonthly();
      renderTenants();
      renderYearly();
      showToast('✅ 동기화 완료');
    })
    .catch(() => {
      showToast('⚠️ 오프라인 - 로컬 데이터 사용 중');
    });
}

function save() {
  localStorage.setItem('rm_tenants',  JSON.stringify(tenants));
  localStorage.setItem('rm_payments', JSON.stringify(payments));
  localStorage.setItem('rm_logs',     JSON.stringify(logs));
  // Firebase REST API로 저장
  fetch(FB_URL, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({tenants, payments, logs})
  }).catch(() => {});
}
function W(n) { return '₩' + n.toLocaleString('ko-KR'); }
function getPayment(tid, y, m) {
  return payments.find(p => p.tenantId===tid && p.year===y && p.month===m);
}
// 렌트프리 여부 판별: 계약 렌트프리(rfMonths) + 특별 렌트프리(rentfree 타입 payment)
function isRentFree(t, year, month) {
  // 계약 렌트프리: rfStart부터 rfMonths개월
  if (t.rfMonths > 0 && t.rfStart) {
    const [ry, rm] = t.rfStart.split('-').map(Number);
    for (let i = 0; i < t.rfMonths; i++) {
      let mm = rm + i, yy = ry;
      if (mm > 12) { mm -= 12; yy++; }
      if (yy === year && mm === month) return true;
    }
  }
  // 특별 렌트프리: payment에 type:'rentfree' 플래그
  const pay = getPayment(t.id, year, month);
  if (pay && pay.type === 'rentfree') return true;
  return false;
}
// 렌트프리이거나 실제 납부된 경우 → "완납처리"
function isPaidOrFree(t, year, month) {
  if (isRentFree(t, year, month)) return true;
  return !!getPayment(t.id, year, month);
}
function getTenant(id) { return tenants.find(t => t.id===id); }

function showPage(p) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.querySelectorAll('.tab-item').forEach(el => {
    if (el.getAttribute('onclick')?.includes(p)) el.classList.add('active');
  });
  document.getElementById('scroll-area').scrollTop = 0;

  const cfg = topbarActions[p];
  document.getElementById('topbar-title').textContent = cfg.title;
  document.getElementById('topbar-sub').textContent   = cfg.sub;

  else { btn.style.display='none'; }

  if (p==='dashboard') renderDashboard();
  if (p==='monthly')   renderMonthly();
  if (p==='log')       renderLog();
  if (p==='tenants')   renderTenants();
  if (p==='yearly')    renderYearly();
}

// ─── 데이터 내보내기 / 불러오기 ───
function exportData() {
  const data = {
    version: 1,
    exportedAt: new Date().toISOString(),
    tenants: tenants,
    payments: payments,
    logs: logs
  };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], {type: 'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const dateStr = new Date().toISOString().slice(0,10);
  a.href     = url;
  a.download = `월세관리_${dateStr}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('✓ 데이터를 내보냈습니다');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.tenants || !data.payments) {
        showToast('올바른 백업 파일이 아닙니다', true); return;
      }
      if (!confirm('현재 데이터를 파일의 데이터로 덮어씁니다.\n계속하시겠습니까?')) return;
      tenants  = data.tenants;
      payments = data.payments;
      logs     = data.logs || [];
      save();
      renderDashboard();
      renderMonthly();
      renderTenants();
      showToast('✓ 데이터를 불러왔습니다');
    } catch(err) {
      showToast('파일을 읽는 중 오류가 발생했습니다', true);
    }
  };
  reader.readAsText(file);
  // 같은 파일 다시 선택 가능하도록 초기화
  event.target.value = '';
}

function renderDashboard() {
  const paidList = payments.filter(p => p.year===curYear && p.month===curMonth && p.type!=='rentfree');
  const paidOrFreeIds = tenants.filter(t => isPaidOrFree(t, curYear, curMonth)).map(t=>t.id);
  const unpaid   = tenants.filter(t => !paidOrFreeIds.includes(t.id));
  const paidAmt  = paidList.reduce((a,p) => a+p.amount, 0);
  const target   = tenants.reduce((a,t) => a+t.rent+t.mgmt, 0);

  document.getElementById('d-target').textContent   = W(target);
  document.getElementById('d-paid').textContent     = paidList.length+'명';
  document.getElementById('d-paid-amt').textContent = W(paidAmt)+' 수령';
  document.getElementById('d-unpaid').textContent   = unpaid.length+'명';
  document.getElementById('d-unpaid-sub').textContent =
    unpaid.length ? unpaid.slice(0,3).map(t=>t.name).join('·')+(unpaid.length>3?'..':'') : '전원완납 🎉';
  
  // Building counts
  const buildings = [...new Set(tenants.map(t=>t.building))];
  const bSub = buildings.map(b=>`${b} ${tenants.filter(t=>t.building===b).length}명`).join(' · ');
  const bSubEl = document.getElementById('d-building-sub');
  if (bSubEl) bSubEl.textContent = bSub;

  // 최근 입금 3건: year/month 기준 정렬 (date값 신뢰 안 함)
  // 새로 입력한 항목(id가 클수록 최신)을 우선시
  const recentPays = payments
    .filter(p => p.type !== 'rentfree')
    .sort((a, b) => {
      // 연/월 내림차순, 같으면 id 내림차순(나중에 입력한 것 우선)
      if (b.year !== a.year) return b.year - a.year;
      if (b.month !== a.month) return b.month - a.month;
      return (b.id||0) - (a.id||0);
    })
    .slice(0, 3);
  const el = document.getElementById('d-log-list');
  if (!recentPays.length) { el.innerHTML='<div class="empty">입금 기록이 없습니다</div>'; return; }
  el.innerHTML = recentPays.map(p => {
    const t = getTenant(p.tenantId);
    return `<div class="log-item">
      <div style="font-size:22px">🏦</div>
      <div class="log-item-main">
        <div class="log-item-name">${t?.name||'?'} <span style="font-size:11px;color:var(--text2)">${t?.building||''} ${t?.unit||''}</span></div>
        <div class="log-item-sub">${p.year}년 ${p.month}월${p.date?' · '+p.date:''}${p.bank&&p.bank!=='기타'?' · '+p.bank:''}</div>
      </div>
      <div class="log-amount">${W(p.amount)}</div>
    </div>`;
  }).join('');
}

// 후불 세입자: 입주 첫달은 납부 대상 아님
function isPayTarget(t, year, month) {
  if ((t.payType || '후불') === '후불') {
    const sd = new Date(t.start);
    const sy = sd.getFullYear(), sm = sd.getMonth() + 1;
    if (year === sy && month === sm) return false; // 입주 첫달 제외
  }
  return true;
}

// ─── Drag & Drop reorder ───
let dragSrcId = null;
function dragStart(e) {
  dragSrcId = parseInt(e.currentTarget.dataset.id);
  e.currentTarget.style.opacity = '0.4';
  e.dataTransfer.effectAllowed = 'move';
}
function dragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  return false;
}
function dropTenant(e) {
  e.stopPropagation();
  const targetId = parseInt(e.currentTarget.dataset.id);
  if (dragSrcId === targetId) return;
  const srcIdx = tenants.findIndex(t=>t.id===dragSrcId);
  const tgtIdx = tenants.findIndex(t=>t.id===targetId);
  const [removed] = tenants.splice(srcIdx, 1);
  tenants.splice(tgtIdx, 0, removed);
  save();
  renderTenants();
  return false;
}
function dragEnd(e) {
  e.currentTarget.style.opacity = '1';
}

// ─── Tenant History Modal ───
// 선불: N월 월세를 N-1월 payDay에 납부  /  후불: N월 월세를 N월 payDay에 납부
function getExpectedPayDate(t, year, month) {
  const day = t.payDay || 1;
  if ((t.payType||'후불') === '선불') {
    // 선불: 전달 payDay에 납부
    let y = year, m = month - 1;
    if (m < 1) { m = 12; y--; }
    const maxDay = new Date(y, m, 0).getDate();
    return `${y}-${String(m).padStart(2,'0')}-${String(Math.min(day,maxDay)).padStart(2,'0')}`;
  } else {
    // 후불: 당월 payDay에 납부
    const maxDay = new Date(year, month, 0).getDate();
    return `${year}-${String(month).padStart(2,'0')}-${String(Math.min(day,maxDay)).padStart(2,'0')}`;
  }
}

function openTenantHistory(tenantId) {
  const t = getTenant(tenantId);
  if (!t) return;
  const startDate = new Date(t.start);
  let startYear = startDate.getFullYear();
  let startMonth = startDate.getMonth() + 1;
  // 후불: 입주 다음달부터 월세 발생
  if ((t.payType || '후불') === '후불') {
    startMonth++;
    if (startMonth > 12) { startMonth = 1; startYear++; }
  }
  const today = new Date();
  const todayYear = today.getFullYear();
  const todayMonth = today.getMonth() + 1;

  let months = [];
  let y = startYear, m = startMonth;
  while (y < todayYear || (y === todayYear && m <= todayMonth)) {
    months.push({year: y, month: m});
    m++; if (m > 12) { m = 1; y++; }
  }

  const unpaidMonths = months.filter(({year, month}) => !isPaidOrFree(t, year, month));

  let streak = 0, unpaidStart = null;
  for (let i = months.length - 1; i >= 0; i--) {
    const {year, month} = months[i];
    if (!isPaidOrFree(t, year, month)) {
      streak++; unpaidStart = `${year}년 ${month}월`;
    } else break;
  }

  const totalUnpaid = unpaidMonths.length;
  const totalUnpaidAmt = totalUnpaid * (t.rent + t.mgmt);

  const byYear = {};
  months.forEach(({year, month}) => {
    if (!byYear[year]) byYear[year] = [];
    byYear[year].push(month);
  });

  const payTypeLabel = (t.payType||'후불') === '선불'
    ? `선불 · 매월 ${t.payDay||1}일 (전달 납부)`
    : `후불 · 매월 ${t.payDay||1}일`;
  const rfLabel = t.rfMonths > 0 && t.rfStart
    ? ` · 계약RF ${t.rfStart}~${t.rfMonths}개월` : '';

  const yearKeys = Object.keys(byYear).map(Number).sort((a,b) => b - a);
  const allCells = yearKeys.map(year => {
    const yearMonths = byYear[year];
    const paidCount = yearMonths.filter(mo => isPaidOrFree(t, year, mo)).length;
    const cells = yearMonths.map(month => {
      const pay = getPayment(tenantId, year, month);
      const rf  = isRentFree(t, year, month);
      const expDate = getExpectedPayDate(t, year, month);
      const isLate = pay && !rf && pay.date > expDate;
      let bg, txtColor, icon, iconSize;
      if (rf) {
        // 렌트프리 = 진한 노랑
        bg='#f59e0b'; txtColor='#1a0f00'; icon='O'; iconSize='16px';
      } else if (pay) {
        // 완납 = 진한 파랑
        bg='#1d4ed8'; txtColor='#ffffff'; icon='O'; iconSize='16px';
      } else {
        // 미납 = 진한 빨강
        bg='#b91c1c'; txtColor='#ffffff'; icon='X'; iconSize='16px';
      }
      const tooltip = rf ? '렌트프리' : pay ? `입금: ${pay.date}${isLate?' (지연)':''}` : `예정: ${expDate}`;
      return `<div
        title="${tooltip}"
        onclick="openHistCellEdit(${tenantId},${year},${month})"
        style="cursor:pointer;display:block;border-radius:8px;padding:6px 2px 5px;text-align:center;background-color:${bg};background:${bg};border:2px solid ${bg};outline:none;-webkit-appearance:none;">
        <div style="display:block;font-size:11px;font-weight:800;line-height:1.2;color:${txtColor};-webkit-text-fill-color:${txtColor};opacity:1;">${month}월</div>
        <div style="display:block;font-size:${iconSize};font-weight:900;line-height:1.3;color:${txtColor};-webkit-text-fill-color:${txtColor};opacity:1;">${icon}</div>
      </div>`;
    }).join('');
    return `<div class="hist-year-section">
      <div class="hist-year-header">
        <span class="hist-year-label">${year}년</span>
        <span class="hist-year-stat ${paidCount===yearMonths.length?'all-paid':paidCount===0?'all-unpaid':'partial'}">${paidCount}/${yearMonths.length}월 납부</span>
      </div>
      <div class="hist-grid">${cells}</div>
    </div>`;
  }).join('');

  const unpaidList = unpaidMonths.map(({year, month}) => {
    const expDate = getExpectedPayDate(t, year, month);
    return `<span onclick="openHistCellEdit(${tenantId},${year},${month})"
      style="display:inline-flex;align-items:center;gap:4px;background:rgba(247,111,111,.15);color:var(--red);border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;margin:2px;cursor:pointer">
      ${year}년 ${month}월 <span style="font-size:10px;opacity:.7">(예정 ${expDate.slice(5)})</span> ✎
    </span>`;
  }).join('');

  document.getElementById('hist-title').textContent = `📋 ${t.name} 납부 이력`;
  document.getElementById('hist-building').textContent = `${t.building} ${t.unit}`;
  document.getElementById('hist-rent').textContent = `월세 ${W(t.rent+t.mgmt)} · ${payTypeLabel}${rfLabel}`;
  document.getElementById('hist-streak').innerHTML = streak > 0
    ? `<span style="color:var(--red);font-weight:900">⚠ ${unpaidStart}부터 ${streak}개월 연속 미납</span>`
    : `<span style="color:var(--green)">✓ 현재 연속 미납 없음</span>`;
  document.getElementById('hist-summary').innerHTML = totalUnpaid > 0
    ? `총 <b style="color:var(--red)">${totalUnpaid}개월</b> 미납 · 누적 <b style="color:var(--red)">${W(totalUnpaidAmt)}</b>`
    : `<span style="color:var(--green)">전월 완납</span>`;
  document.getElementById('hist-all-years').innerHTML = allCells;
  document.getElementById('hist-unpaid-list').innerHTML = totalUnpaid > 0 ? unpaidList : '<span style="color:var(--green)">미납 없음</span>';
  document.getElementById('hist-pay-btn').setAttribute('onclick', `event.stopPropagation();quickPayFromHistory(${tenantId})`);
  document.getElementById('hist-modal').classList.add('show');
}

// ─── 납부이력 셀 터치 → 해당 월 편집 ───
let _histCellTenantId=null, _histCellYear=null, _histCellMonth=null;
function openHistCellEdit(tenantId, year, month) {
  const t = getTenant(tenantId);
  if (!t) return;
  _histCellTenantId=tenantId; _histCellYear=year; _histCellMonth=month;
  const pay = getPayment(tenantId, year, month);
  const rf  = isRentFree(t, year, month);
  const expDate = getExpectedPayDate(t, year, month);

  document.getElementById('hce-title').textContent = `${year}년 ${month}월 · ${t.name}`;
  document.getElementById('hce-label').textContent =
    rf ? '🆓 렌트프리 (면제)' :
    `${(t.payType||'후불')==='선불'?'선불':'후불'} · 예정일 ${expDate}`;
  document.getElementById('hce-label').style.background = rf
    ? 'rgba(5,150,105,.12)' : 'rgba(79,142,247,.1)';
  document.getElementById('hce-label').style.color = rf ? 'var(--green)' : 'var(--accent)';

  // 입금 폼 섹션 표시/숨김
  const formSection = document.getElementById('hce-form-section');
  formSection.style.display = rf ? 'none' : 'block';

  document.getElementById('hce-date').value   = pay && !rf ? pay.date : expDate;
  document.getElementById('hce-amount').value = pay && !rf ? pay.amount : (t.rent+t.mgmt);
  document.getElementById('hce-bank').value   = pay && !rf ? (pay.bank||'기타') : '기타';
  document.getElementById('hce-memo').value   = pay && !rf ? (pay.memo||'') : `${year}년 ${month}월 월세`;

  // 특별 렌트프리(payment 타입) 삭제 버튼: 계약 RF는 세입자 정보에서 수정
  const isSpecialRF = pay && pay.type==='rentfree';
  document.getElementById('hce-delete-btn').style.display = (pay && !rf) ? 'block' : 'none';
  document.getElementById('hce-rf-section').style.display = 'block';
  document.getElementById('hce-rf-toggle-btn').textContent = rf
    ? (isSpecialRF ? '🆓 렌트프리 해제' : '🔒 계약 렌트프리 (세입자정보에서 수정)')
    : '🆓 이 달 렌트프리로 지정';
  document.getElementById('hce-rf-toggle-btn').style.background = rf
    ? 'rgba(220,38,38,.10)' : 'rgba(5,150,105,.10)';
  document.getElementById('hce-rf-toggle-btn').style.color = rf ? 'var(--red)' : 'var(--green)';
  document.getElementById('hce-rf-toggle-btn').style.borderColor = rf
    ? 'rgba(220,38,38,.3)' : 'rgba(5,150,105,.3)';
  // 계약 RF인 경우 토글 불가 (disabled처럼)
  const isContractRF = rf && !isSpecialRF;
  document.getElementById('hce-rf-toggle-btn').onclick = isContractRF
    ? ()=>showToast('계약 렌트프리는 세입자 정보에서 수정하세요', true)
    : ()=>toggleSpecialRF(tenantId, year, month);

  document.getElementById('hce-save-btn').textContent = pay && !rf ? '💾 수정 저장' : '✅ 입금 확인';
  document.getElementById('hce-save-btn').style.display = rf ? 'none' : 'block';
  document.getElementById('hist-cell-edit-modal').classList.add('show');
}
function saveHistCellEdit() {
  const tenantId=_histCellTenantId, year=_histCellYear, month=_histCellMonth;
  const date   = document.getElementById('hce-date').value;
  const amount = parseInt(document.getElementById('hce-amount').value)||0;
  const bank   = document.getElementById('hce-bank').value;
  const memo   = document.getElementById('hce-memo').value;
  if (!date) { showToast('날짜를 입력해주세요', true); return; }

  const existing = getPayment(tenantId, year, month);
  if (existing) {
    existing.date=date; existing.amount=amount; existing.bank=bank; existing.memo=memo;
  } else {
    const nid = (payments.reduce((mx,p)=>Math.max(mx,p.id),0))+1;
    payments.push({id:nid, tenantId, year, month, date, amount, bank, memo});
  }
  save();
  closeSheet('hist-cell-edit-modal');
  openTenantHistory(tenantId);  // 이력 새로고침
  renderDashboard(); renderMonthly();
  showToast(`✓ ${year}년 ${month}월 저장됐습니다`);
}
function deleteHistCellPay() {
  const tenantId=_histCellTenantId, year=_histCellYear, month=_histCellMonth;
  if (!confirm(`${year}년 ${month}월 입금 기록을 삭제할까요?`)) return;
  payments = payments.filter(p=>!(p.tenantId===tenantId && p.year===year && p.month===month));
  save();
  closeSheet('hist-cell-edit-modal');
  openTenantHistory(tenantId);
  renderDashboard(); renderMonthly();
  showToast(`${year}년 ${month}월 기록 삭제됨`);
}
function toggleSpecialRF(tenantId, year, month) {
  const pay = getPayment(tenantId, year, month);
  if (pay && pay.type === 'rentfree') {
    // 해제
    payments = payments.filter(p=>!(p.tenantId===tenantId&&p.year===year&&p.month===month));
    showToast(`${year}년 ${month}월 렌트프리 해제됨`);
  } else {
    // 기존 입금기록 제거 후 렌트프리로
    payments = payments.filter(p=>!(p.tenantId===tenantId&&p.year===year&&p.month===month));
    const nid = (payments.reduce((mx,p)=>Math.max(mx,p.id),0))+1;
    payments.push({id:nid, tenantId, year, month, date:`${year}-${String(month).padStart(2,'0')}-01`, amount:0, bank:'렌트프리', memo:'렌트프리', type:'rentfree'});
    showToast(`🆓 ${year}년 ${month}월 렌트프리 지정됨`);
  }
  save();
  closeSheet('hist-cell-edit-modal');
  openTenantHistory(tenantId);
  renderDashboard(); renderMonthly();
}
function quickPayFromHistory(tenantId) {
  closeSheet('hist-modal');
  quickPay(tenantId);
}

// ─── Swipe Navigation ───
const PAGE_ORDER = ['dashboard','monthly','log','tenants','yearly'];
let swipeStartX = 0, swipeStartY = 0, swipeStartTime = 0;

document.getElementById('scroll-area').addEventListener('touchstart', e => {
  swipeStartX = e.touches[0].clientX;
  swipeStartY = e.touches[0].clientY;
  swipeStartTime = Date.now();
}, {passive: true});

document.getElementById('scroll-area').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - swipeStartX;
  const dy = e.changedTouches[0].clientY - swipeStartY;
  const dt = Date.now() - swipeStartTime;
  // 가로 스와이프만 처리: 빠르고(300ms), 충분히 길고(60px), 세로보다 가로가 큰 경우
  if (dt > 350 || Math.abs(dx) < 60 || Math.abs(dy) > Math.abs(dx) * 0.6) return;
  const cur = PAGE_ORDER.findIndex(p => document.getElementById('page-'+p).classList.contains('active'));
  if (dx < 0 && cur < PAGE_ORDER.length - 1) showPage(PAGE_ORDER[cur + 1]); // 왼쪽 → 다음
  if (dx > 0 && cur > 0) showPage(PAGE_ORDER[cur - 1]); // 오른쪽 → 이전
}, {passive: true});

// ─── Exit Confirmation ───
window.addEventListener('beforeunload', e => {
  e.preventDefault();
  e.returnValue = '앱을 종료할까요?';
  return '앱을 종료할까요?';
});

// 안드로이드 뒤로가기 버튼
window.addEventListener('popstate', () => {
  const cur = PAGE_ORDER.findIndex(p => document.getElementById('page-'+p).classList.contains('active'));
  // 모달이 열려 있으면 먼저 닫기
  const openModal = document.querySelector('.overlay.show');
  if (openModal) { openModal.classList.remove('show'); history.pushState(null,'',location.href); return; }
  if (cur > 0) {
    showPage(PAGE_ORDER[cur - 1]);
    history.pushState(null,'',location.href);
  } else {
    // 첫 화면에서 뒤로 → 종료 확인
    if (confirm('앱을 종료할까요?')) { history.back(); }
    else { history.pushState(null,'',location.href); }
  }
});
history.pushState(null,'',location.href);

// ─── Init ───
document.getElementById('log-date').value  = new Date().toISOString().split('T')[0];
document.getElementById('modal-date').value = new Date().toISOString().split('T')[0];
populatePaySelect();
populateLogSelect();
renderDashboard();
// Firebase에서 최신 데이터 불러오기 (동기화)
loadFromFirebase();
</script>

      <span style="display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:900;color:#1a0f00;-webkit-text-fill-color:#1a0f00;background:#f59e0b;border-radius:6px;padding:4px 11px;border:2px solid #d97706">🟡 렌트프리</span>
      <span style="display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:900;color:#fff;-webkit-text-fill-color:#fff;background:#b91c1c;border-radius:6px;padding:4px 11px;border:2px solid #991b1b">🔴 미납</span>

</div>

<!-- 납부이력 셀 편집 Modal -->

  <div class="sheet">
    <div class="sheet-handle"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">

      </button>

    <button class="btn-full" onclick="closeSheet('hist-cell-edit-modal')"
      style="background:var(--surface2);color:var(--text2);margin-top:8px">닫기</button>
  </div>
</div>
